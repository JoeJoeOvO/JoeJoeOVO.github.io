name: Update homepage resource metrics

on:
  schedule:
    - cron: "17 20 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update resource metric cache
        run: python scripts/update_resource_metrics.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit resource metric cache
        run: |
          if git diff --quiet -- data/resource-metrics.json; then
            echo "Resource metric cache unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/resource-metrics.json
          git commit -m "Update homepage resource metric cache"
          git push
