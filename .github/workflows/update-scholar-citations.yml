name: Update Scholar citations

on:
  schedule:
    - cron: "17 20 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update citation cache
        run: python scripts/update_scholar_citations.py

      - name: Commit citation cache
        run: |
          if git diff --quiet -- data/scholar-citations.json; then
            echo "Citation cache unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scholar-citations.json
          git commit -m "Update Scholar citation cache"
          git push
