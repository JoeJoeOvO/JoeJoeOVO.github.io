name: Update homepage metrics

on:
  schedule:
    - cron: "17 20 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Scholar browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Update citation cache
        id: update_citations
        continue-on-error: true
        run: python scripts/update_scholar_citations.py --strict
        env:
          SCHOLAR_BROWSER_FETCH: "1"
          SCHOLAR_COOKIE: ${{ secrets.SCHOLAR_COOKIE }}
          SCHOLAR_PROXY: ${{ secrets.SCHOLAR_PROXY }}
          SCHOLAR_RETRIES: "3"
          SCHOLAR_RETRY_DELAY: "5"

      - name: Update resource metric cache
        run: python scripts/update_resource_metrics.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit metric caches
        run: |
          if git diff --quiet -- data/scholar-citations.json data/resource-metrics.json; then
            echo "Metric caches unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scholar-citations.json data/resource-metrics.json
          git commit -m "Update homepage metric caches"
          git push

      - name: Report Scholar update failure
        if: steps.update_citations.outcome == 'failure'
        run: echo "::warning::Google Scholar citation update failed; existing citation cache was kept."
